---
- name: Deploy Rocky Linux VM via Terraform
  hosts: localhost
  gather_facts: false
  vars:
    tf_dir: "{{ playbook_dir }}/terraform/rocky-deploy"
    ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBNFA5Rsd7PHUa5k/C/cpqnUEQCO3IlnE8pyCJIRRHl1 terraform@pve-terraform"
    pve_endpoint: "https://10.10.10.240:8006"
    pve_node: "pve-nagixdtc"

  tasks:
    - name: Terraform init
      ansible.builtin.command: terraform init -input=false
      args:
        chdir: "{{ tf_dir }}"
      changed_when: false

    - name: Terraform apply
      ansible.builtin.command: >
        terraform apply -auto-approve -input=false
        -var="pve_endpoint={{ pve_endpoint }}/"
        -var="pve_api_token=terraform@pve!provider={{ pve_token_secret }}"
        -var="vm_hostname={{ vm_hostname }}"
        -var="ip_mode={{ ip_mode }}"
        -var="vm_ip={{ vm_ip | default('') }}"
        -var="vm_gateway={{ vm_gateway | default('') }}"
        -var="ssh_public_key={{ ssh_public_key }}"
      args:
        chdir: "{{ tf_dir }}"
      register: tf_apply

    - name: Get Terraform outputs
      ansible.builtin.command: terraform output -json
      args:
        chdir: "{{ tf_dir }}"
      register: tf_output
      changed_when: false

    - name: Parse VM ID from Terraform output
      ansible.builtin.set_fact:
        new_vm_id: "{{ (tf_output.stdout | from_json).vm_id.value }}"

    - name: Show new VM ID
      ansible.builtin.debug:
        var: new_vm_id

    - name: Poll Proxmox API for agent-reported IP
      ansible.builtin.uri:
        url: "{{ pve_endpoint }}/api2/json/nodes/{{ pve_node }}/qemu/{{ new_vm_id }}/agent/network-get-interfaces"
        method: GET
        headers:
          Authorization: "PVEAPIToken=terraform@pve!provider={{ pve_token_secret }}"
        validate_certs: false
        status_code: [200, 500]
      register: agent_net
      until: >
        agent_net.status == 200 and
        (agent_net.json.data.result
          | rejectattr('name', 'equalto', 'lo')
          | map(attribute='ip-addresses')
          | flatten
          | selectattr('ip-address-type', 'equalto', 'ipv4')
          | list
          | length) > 0
      retries: 18
      delay: 10

    - name: Extract real IPv4 address from agent response
      ansible.builtin.set_fact:
        vm_real_ip: >-
          {{
            agent_net.json.data.result
              | rejectattr('name', 'equalto', 'lo')
              | map(attribute='ip-addresses')
              | flatten
              | selectattr('ip-address-type', 'equalto', 'ipv4')
              | map(attribute='ip-address')
              | first
          }}

    - name: Show deployed VM IP
      ansible.builtin.debug:
        var: vm_real_ip

    - name: Wait for SSH to be available on new VM
      ansible.builtin.wait_for:
        host: "{{ vm_real_ip }}"
        port: 22
        delay: 5
        timeout: 120

    - name: Add new VM to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ vm_real_ip }}"
        groups: new_vms
        ansible_user: "{{ vm_user | default('nagix') }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        deployed_hostname_segment: "{{ vm_hostname }}"

- name: Configure new VM
  hosts: new_vms
  gather_facts: false
  tasks:
    - name: Set hostname on new VM
      ansible.builtin.hostname:
        name: "srv-{{ deployed_hostname_segment }}"
